<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسبيحات</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://i.imgur.com/NsPJPjn.jpeg') no-repeat center top;
    background-size: cover;
}

/* مسافة من فوق حتى نصل للبوكسات */
.container {
    padding-top: 330px;
    padding-bottom: 50px;
}

/* كل عنصر */
.item {
    margin: 40px auto;
    width: 90%;
    max-width: 400px;
    position: relative;
}

/* صف الأزرار */
.controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
}

/* العداد (يسار) */
.count-box {
    background: white;
    padding: 10px 15px;
    border-radius: 12px;
    font-size: 16px;
    color: #1f2a5a;
    min-width: 90px;
    text-align: center;
}

/* الزر */
button {
    background-color: #1f2a5a;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 14px;
    font-size: 16px;
    cursor: pointer;
}

button:disabled {
    background-color: gray;
}
</style>
</head>

<body>

<div class="container">

    <!-- الاول -->
    <div class="item">
        <div class="controls">
            <div class="count-box" id="count1">0 / 70</div>
            <button onclick="increment(1,70)">تسبيح</button>
        </div>
    </div>

    <!-- الثاني -->
    <div class="item">
        <div class="controls">
            <div class="count-box" id="count2">0 / 7</div>
            <button onclick="increment(2,7)">تسبيح</button>
        </div>
    </div>

    <!-- الثالث -->
    <div class="item">
        <div class="controls">
            <div class="count-box" id="count3">0 / 300</div>
            <button onclick="increment(3,300)">تسبيح</button>
        </div>
    </div>

</div>

<script>
let counters = [0,0,0];

function increment(index, max) {
    let i = index - 1;

    if (counters[i] < max) {
        counters[i]++;
        document.getElementById("count"+index).innerText = counters[i] + " / " + max;
    }

    if (counters[i] === max) {
        document.querySelectorAll("button")[i].disabled = true;
    }
}
</script>

</body>
</html>
