<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسبيحات</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://i.imgur.com/NsPJPjn.jpeg') no-repeat center center fixed;
    background-size: cover;
}

/* نخلي كلشي فوق الصورة */
.wrapper {
    position: relative;
    height: 100vh;
}

/* كل سطر */
.item {
    position: absolute;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* أماكنهم حسب الصورة */
.item1 { top: 42%; }
.item2 { top: 58%; }
.item3 { top: 74%; }

/* العداد */
.count-box {
    background: white;
    padding: 10px 15px;
    border-radius: 12px;
    font-size: 18px;
    color: #1f2a5a;
    position: absolute;
    left: 10%;
    min-width: 90px;
    text-align: center;
}

/* الزر بالنص */
button {
    background-color: #1f2a5a;
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
}

button:disabled {
    background-color: gray;
    cursor: not-allowed;
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- الاول -->
    <div class="item item1">
        <div class="count-box" id="count1">0 / 70</div>
        <button onclick="increment(1,70)">تسبيح</button>
    </div>

    <!-- الثاني -->
    <div class="item item2">
        <div class="count-box" id="count2">0 / 7</div>
        <button onclick="increment(2,7)">تسبيح</button>
    </div>

    <!-- الثالث -->
    <div class="item item3">
        <div class="count-box" id="count3">0 / 300</div>
        <button onclick="increment(3,300)">تسبيح</button>
    </div>

</div>

<script>
let counters = [0,0,0];

function increment(index, max) {
    let i = index - 1;

    if (counters[i] < max) {
        counters[i]++;
        document.getElementById("count"+index).innerText = counters[i] + " / " + max;
    }

    if (counters[i] === max) {
        document.querySelectorAll("button")[i].disabled = true;
    }
}
</script>

</body>
</html>
