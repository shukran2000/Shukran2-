<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسبيحات</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: url('https://i.imgur.com/NsPJPjn.jpeg') no-repeat center center fixed;
    background-size: cover;
}

/* ننزل العناصر حسب التصميم */
.container {
    margin-top: 260px;
}

/* كل تسبيحة */
.item {
    margin: 40px 0;
}

/* العداد */
.count {
    font-size: 22px;
    color: #1f2a5a;
    margin-bottom: 10px;
    font-weight: bold;
}

/* الزر */
button {
    background-color: #1f2a5a;
    color: white;
    border: none;
    padding: 14px 35px;
    border-radius: 14px;
    font-size: 16px;
    cursor: pointer;
}

button:disabled {
    background-color: gray;
    cursor: not-allowed;
}
</style>
</head>

<body>

<div class="container">

    <!-- الاول -->
    <div class="item">
        <div class="count" id="count1">0 / 70</div>
        <button onclick="increment(1,70)">تسبيح</button>
    </div>

    <!-- الثاني -->
    <div class="item">
        <div class="count" id="count2">0 / 7</div>
        <button onclick="increment(2,7)">تسبيح</button>
    </div>

    <!-- الثالث -->
    <div class="item">
        <div class="count" id="count3">0 / 300</div>
        <button onclick="increment(3,300)">تسبيح</button>
    </div>

</div>

<script>
let counters = [0,0,0];

function increment(index, max) {
    let i = index - 1;

    if (counters[i] < max) {
        counters[i]++;
        document.getElementById("count"+index).innerText = counters[i] + " / " + max;
    }

    if (counters[i] === max) {
        document.querySelectorAll("button")[i].disabled = true;
    }
}
</script>

</body>
</html>
